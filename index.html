<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الذكاء لا جنسَ له</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
–ink:        #111118;
–ink-soft:   #1e1e2a;
–cream:      #f9f5ef;
–warm:       #f2ece2;
–gold:       #c8923a;
–gold-lt:    #e4b96a;
–gold-pale:  #fdf3e3;
–teal:       #2d6b6b;
–teal-lt:    #4a9999;
–teal-pale:  #e6f2f2;
–rose:       #b05252;
–rose-pale:  #f9eaea;
–slate:      #3c3c50;
–muted:      #888899;
–line:       #e2dcd4;
–white:      #ffffff;
}

body {
background: #e8e2d8;
font-family: ‘Cairo’, ‘Tajawal’, sans-serif;
direction: rtl;
-webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════
PAGE WRAPPER
═══════════════════════════════════ */
.infographic {
width: 900px;
margin: 40px auto;
background: var(–cream);
position: relative;
overflow: hidden;
box-shadow: 0 30px 80px rgba(0,0,0,0.22);
}

/* ═══════════════════════════════════
HEADER
═══════════════════════════════════ */
.hero {
background: var(–ink);
padding: 70px 64px 58px;
position: relative;
overflow: hidden;
}

.hero-geo {
position: absolute;
top: 0; left: 0; right: 0; bottom: 0;
pointer-events: none;
}

.hero-geo circle { fill: none; }
.hero-geo line { stroke: rgba(200,146,58,0.10); stroke-width: 1; }

.hero-eyebrow {
display: inline-flex;
align-items: center;
gap: 10px;
margin-bottom: 28px;
}

.hero-tag {
font-size: 10px;
font-weight: 700;
letter-spacing: 3px;
text-transform: uppercase;
color: var(–gold);
border: 1px solid rgba(200,146,58,0.35);
padding: 5px 13px;
border-radius: 2px;
}

.hero-dot {
width: 5px; height: 5px;
border-radius: 50%;
background: rgba(200,146,58,0.4);
}

.hero-h1 {
font-family: ‘Cairo’, sans-serif;
font-size: 72px;
font-weight: 900;
color: var(–white);
line-height: 1.0;
letter-spacing: -1px;
margin-bottom: 6px;
position: relative;
z-index: 2;
}

.hero-h1 .accent { color: var(–gold); }

.hero-rule {
width: 56px; height: 3px;
background: linear-gradient(90deg, var(–gold), transparent);
margin: 22px 0;
position: relative; z-index: 2;
}

.hero-lead {
font-size: 16px;
font-weight: 300;
color: rgba(255,255,255,0.6);
line-height: 1.85;
max-width: 500px;
position: relative; z-index: 2;
}

/* ═══════════════════════════════════
ORIGIN BAND
═══════════════════════════════════ */
.origin {
background: var(–teal);
padding: 40px 64px;
display: grid;
grid-template-columns: 200px 1px 1fr;
gap: 36px;
align-items: center;
}

.origin-left .eyebrow {
font-size: 10px;
font-weight: 700;
letter-spacing: 2.5px;
text-transform: uppercase;
color: var(–gold-lt);
margin-bottom: 10px;
}

.origin-left h2 {
font-size: 19px;
font-weight: 800;
color: var(–white);
line-height: 1.4;
}

.origin-sep {
width: 1px;
height: 72px;
background: rgba(255,255,255,0.18);
margin: auto;
}

.origin-text {
font-size: 14px;
font-weight: 400;
color: rgba(255,255,255,0.78);
line-height: 2.0;
}

/* ═══════════════════════════════════
BODY
═══════════════════════════════════ */
.body {
padding: 60px 64px;
display: flex;
flex-direction: column;
gap: 58px;
}

/* Section heading */
.sec-head {
display: flex;
align-items: flex-start;
gap: 16px;
margin-bottom: 30px;
}

.sec-icon {
width: 42px; height: 42px;
border-radius: 10px;
display: flex; align-items: center; justify-content: center;
font-size: 20px;
flex-shrink: 0;
margin-top: 2px;
}

.ic-gold { background: rgba(200,146,58,0.12); }
.ic-teal { background: var(–teal-pale); }
.ic-rose { background: var(–rose-pale); }
.ic-ink  { background: rgba(17,17,24,0.07); }

.sec-title {
font-size: 21px;
font-weight: 800;
color: var(–ink);
line-height: 1.3;
}

.sec-sub {
font-size: 12px;
font-weight: 500;
color: var(–muted);
margin-top: 3px;
letter-spacing: 0.3px;
}
